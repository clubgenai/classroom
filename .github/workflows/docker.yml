name: Build & Push Docker images

on:
  push:
    branches: [main]

jobs:
  classroom-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ghcr.io/clubgenai/classroom-api:latest,ghcr.io/clubgenai/classroom-api:${{ github.sha }}

  classroom-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: ghcr.io/clubgenai/classroom-web:latest,ghcr.io/clubgenai/classroom-web:${{ github.sha }}
